# Oracle test corpus — real media mapped to sheathe input paths and the reference
# oracle that certifies each one. Media blobs are fetched by corpus/fetch.sh and
# are NOT committed; this manifest + checksums.sha256 are.
#
# oracle:
#   shaka      — package with sheathe + Shaka Packager, diff CMAF boxes / MPD / HLS
#   ffprobe    — structural + decode check (no Shaka reference for this container)
#   ccextractor — caption oracle: diff emitted WebVTT vs ccextractor on the source
#
# status: matches ROADMAP phase colour for the corresponding input path.

[[asset]]
file = "bear-1280x720.ts"
input = "sheathe-ts"
container = "mpeg-ts"
video = "h264"
audio = "aac"
oracle = "shaka"
status = "yellow"

[[asset]]
file = "bear-1280x720.mp4"
input = "sheathe-mp4"
container = "mp4"
video = "h264"
audio = "aac"
oracle = "shaka"
status = "green"       # baseline — should already match Shaka

[[asset]]
file = "bear.h264"      # derived: raw Annex B elementary stream
input = "sheathe-es"
container = "annexb"
video = "h264"
oracle = "ffprobe"
status = "yellow"

[[asset]]
file = "bear.aac"       # derived: raw ADTS-AAC elementary stream
input = "sheathe-es"
