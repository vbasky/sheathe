[[asset]]
file = "bear-708.h264"  # synthetic: H.264 Annex B with CEA-708 DTVCC captions in SEI
input = "sheathe-es"
container = "annexb"
video = "h264"
captions = "cea-708"
oracle = "ffprobe"
# Generated by `cargo test -p sheathe-text -- generate_708_corpus_asset --ignored`
# 150 frames with 10 cycling captions; all 150/150 decode correctly.
status = "yellow"

[[asset]]
file = "bear-vp9.webm"
