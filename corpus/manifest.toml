# NB: this file also carries a Vorbis audio track, but Vorbis is roadmap-open
# (see sfx.ogg / the sheathe-mkv Vorbis item) so it is not gated here; this asset
# certifies the VP8 video + WebVTT-in-WebM paths.
text = "webvtt"
oracle = "ffprobe"
status = "yellow"

