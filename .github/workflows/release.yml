name: Release

# Builds the `sheathe` binary for each platform on a version tag and attaches the
# archives to a GitHub Release. (Crate publishing to crates.io is done manually,
# or can be added here later with a CARGO_REGISTRY_TOKEN secret.)
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  binaries:
    name: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: macos-13, target: x86_64-apple-darwin }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release -p sheathe --target ${{ matrix.target }}
      - name: Package
        run: |
          dir="target/${{ matrix.target }}/release"
          archive="sheathe-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          tar -C "$dir" -czf "$archive" sheathe
          echo "ARCHIVE=$archive" >> "$GITHUB_ENV"
      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Create the release once (ignore "already exists" from parallel jobs),
          # then attach this platform's archive.
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "Automated release ${{ github.ref_name }}. See ROADMAP.md for scope." \
            --verify-tag || true
          gh release upload "${{ github.ref_name }}" "$ARCHIVE" --clobber
